<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Winfred Nkatha favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0718"/>
      <stop offset="55%" stop-color="#1d0b2d"/>
      <stop offset="100%" stop-color="#2d1148"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7ecff"/>
      <stop offset="45%" stop-color="#c58cff"/>
      <stop offset="100%" stop-color="#7a3cff"/>
    </linearGradient>
    <linearGradient id="monogram" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2ff"/>
      <stop offset="40%" stop-color="#d6a6ff"/>
      <stop offset="100%" stop-color="#8a43ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#b26cff" stop-opacity="0.38"/>
      <stop offset="60%" stop-color="#b26cff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b26cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.55  0 1 0 0 0.28  0 0 1 0 1  0 0 0 0.9 0" result="purpleBlur"/>
      <feMerge>
        <feMergeNode in="purpleBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <circle cx="32" cy="27" r="23" fill="url(#glow)"/>

  <g filter="url(#softGlow)">
    <rect x="14.5" y="14.5" width="35" height="35" rx="10" fill="none" stroke="url(#frame)" stroke-width="1.4" opacity="0.72"/>
    <path d="M16 23h5.3l5.4 13.4L32 23l5.3 13.4L42.7 23H48" fill="none" stroke="url(#monogram)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M26 23v18.5" fill="none" stroke="url(#monogram)" stroke-width="5.2" stroke-linecap="round"/>
    <path d="M37 23v18.5l11-18.5v18.5" fill="none" stroke="url(#monogram)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
